<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Defy Studios — Let's Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Alumni+Sans+Pinstripe&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background-color: #060e1c;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(255,180,0,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-family: 'Alumni Sans Pinstripe', serif;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #ffb400;
    text-align: center;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Alumni Sans Pinstripe', serif;
    font-size: 42px;
    font-weight: 400;
    color: #ffffff;
    text-align: center;
    line-height: 1.15;
    letter-spacing: 0.04em;
    margin-bottom: 10px;
  }

  h1 em { font-style: italic; color: #ffb400; }

  .subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.28);
    text-align: center;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-bottom: 48px;
    line-height: 1.8;
    text-transform: uppercase;
  }

  .form-group {
    margin-bottom: 24px;
    position: relative;
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 9px;
  }

  input, textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 10px 0 12px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #fff;
    outline: none;
    transition: border-color 0.3s;
    -webkit-appearance: none;
    border-radius: 0;
  }

  input::placeholder, textarea::placeholder {
    color: rgba(255,255,255,0.15);
    font-size: 13px;
  }

  input:focus, textarea:focus { border-bottom-color: #ffb400; }
  textarea { resize: none; height: 80px; line-height: 1.7; }

  .form-group::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background: #ffb400;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
  }

  .form-group:focus-within::after { width: 100%; }

  .submit-wrap {
    margin-top: 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  .submit-note {
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    font-weight: 300;
    letter-spacing: 0.06em;
    line-height: 1.6;
    max-width: 160px;
  }

  .submit-btn {
    flex-shrink: 0;
    padding: 14px 32px;
    background: #ffb400;
    border: none;
    border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #060e1c;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .submit-btn:hover { background: #ffc533; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }

  .footer {
    margin-top: 52px;
    text-align: center;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: center;
  }

  .footer-line {
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.06);
    max-width: 80px;
  }

  .footer p {
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .footer a { color: rgba(255,180,0,0.35); text-decoration: none; }
  .footer a:hover { color: #ffb400; }
</style>
</head>
<body>

<div class="container">

  <form action="https://formspree.io/f/xrerberq" method="POST">

    <p class="eyebrow">New Enquiry</p>
    <h1>Let's Create<br><em>Together</em></h1>
    <p class="subtitle">Share your vision — we'll handle the rest</p>

    <div class="row">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Smith" required />
      </div>
      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" placeholder="Acme Inc." />
      </div>
    </div>

    <div class="row" style="margin-top:24px">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="jane@acme.com" required />
      </div>
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" placeholder="+971 50 000 0000" />
      </div>
    </div>

    <div class="form-group" style="margin-top:24px">
      <label for="message">How Can We Help</label>
      <textarea id="message" name="message" placeholder="Tell us about your project, goals, or challenges…" required></textarea>
    </div>

    <!-- Redirect back to your form after submission -->
    <input type="hidden" name="_next" value="https://sinanreyas.github.io/defy-form?success=true" />

    <div class="submit-wrap">
      <p class="submit-note">We respond within 24 hours, every time.</p>
      <button type="submit" class="submit-btn">Send Message</button>
    </div>

    <div class="footer">
      <div class="footer-line"></div>
      <p>defystudios.ae &nbsp;·&nbsp; <a href="#">Privacy Policy</a></p>
      <div class="footer-line"></div>
    </div>

  </form>

</div>

</body>
</html>
